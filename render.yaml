databases:
  - name: sutura-db
    databaseName: sutura
    user: sutura
    plan: free

services:
  - type: web
    name: sutura-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: APP_NAME
        value: SuturaMed
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        fromService:
          type: web
          name: sutura-backend
          property: host
      - key: APP_KEY
        sync: false        # A générer : php artisan key:generate --show
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: warning
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: sutura-db
          property: connectionString
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: GEMINI_API_KEY
        sync: false        # A renseigner dans le dashboard Render
